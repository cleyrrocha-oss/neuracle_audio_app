<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Neuracle">
<title>NEURACLE · Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#03050b;
  --node-color:rgba(200,220,255,0.85);
  --pulse:rgba(180,150,255,0.6);
  --neura-bubble:linear-gradient(135deg,rgba(14,10,46,0.92),rgba(26,16,90,0.92));
  --user-bubble:rgba(255,255,255,0.07);
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Space Mono',monospace;color:white;}

/* ══ TELA SPLASH ══ */
#screen-splash{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:300;
  background:var(--bg);
}
#splash-canvas{position:absolute;inset:0;width:100%;height:100%;}
.splash-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:32px;}
.splash-logo{
  font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:300;
  letter-spacing:12px;text-transform:uppercase;color:rgba(255,255,255,0.22);
  animation:fadeUp 1.8s ease both;
}
.splash-title{
  font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;
  color:rgba(255,255,255,0.06);letter-spacing:2px;
  animation:fadeUp 2s ease 0.3s both;
}
.splash-sub{
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,0.1);animation:fadeUp 2s ease 0.6s both;
}
.splash-btn{
  margin-top:16px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.55);
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:4px;text-transform:uppercase;
  padding:14px 36px;border-radius:40px;cursor:pointer;
  transition:all 0.5s;backdrop-filter:blur(12px);
  animation:fadeUp 2s ease 1s both;
  box-shadow:0 0 40px rgba(200,180,255,0.04);
}
.splash-btn:hover{border-color:rgba(255,255,255,0.45);color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.08);box-shadow:0 0 50px rgba(200,180,255,0.12);}
.splash-badge{
  font-size:7px;letter-spacing:2px;color:rgba(200,180,255,0.2);
  animation:fadeUp 2s ease 1.4s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}

/* ══ TELA ONBOARDING ══ */
#screen-onboarding{
  position:fixed;inset:0;display:none;flex-direction:column;
  align-items:stretch;z-index:200;background:var(--bg);
  opacity:0;transition:opacity 0.8s ease;
}
#screen-onboarding.visible{display:flex;}
#screen-onboarding.active{opacity:1;}

/* Canvas neural de fundo */
#ob-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

/* Cabeçalho */
.ob-header{
  position:relative;z-index:10;
  padding:54px 24px 16px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  flex-shrink:0;
}
.ob-logo{
  font-family:'Cormorant Garamond',serif;font-size:10px;font-weight:300;
  letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,0.12);
}
.ob-step-label{
  font-size:7px;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(200,180,255,0.3);transition:all 0.4s;
}
.ob-progress{display:flex;gap:4px;align-items:center;margin-top:4px;}
.ob-prog-dot{
  height:3px;border-radius:2px;background:rgba(255,255,255,0.1);
  transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.ob-prog-dot.done{background:rgba(200,180,255,0.5);width:8px;}
.ob-prog-dot.current{background:rgba(255,255,255,0.75);width:20px;}
.ob-prog-dot.pending{width:5px;}

/* Área de diálogo — scroll */
.ob-dialog{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:16px 20px;
  display:flex;flex-direction:column;gap:14px;
  position:relative;z-index:10;
}
.ob-bubble{
  border-radius:20px;padding:16px 20px;
  font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;
  line-height:1.6;max-width:88%;
  animation:bubbleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  backdrop-filter:blur(16px);
}
.ob-bubble.neura{
  background:var(--neura-bubble);
  border:1px solid rgba(180,150,255,0.15);
  color:rgba(255,255,255,0.82);
  align-self:flex-start;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.ob-bubble.user{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.75);
  align-self:flex-end;text-align:right;
}
.ob-bubble.hint{
  background:rgba(200,180,255,0.05);
  border:1px solid rgba(200,180,255,0.1);
  color:rgba(200,180,255,0.45);
  font-size:13px;align-self:center;text-align:center;
  padding:10px 18px;
}
@keyframes bubbleIn{from{opacity:0;transform:translateY(20px) scale(0.95);}to{opacity:1;transform:none;}}

/* Typing dots */
.typing-dots{display:flex;gap:6px;padding:6px 2px;align-items:center;}
.typing-dots span{
  width:6px;height:6px;border-radius:50%;
  background:rgba(200,180,255,0.55);
  animation:dotB 1.4s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dotB{0%,80%,100%{transform:translateY(0);opacity:0.35;}40%{transform:translateY(-7px);opacity:1;}}

/* Área de input na base */
.ob-input-area{
  position:relative;z-index:10;
  padding:12px 20px 40px;
  flex-shrink:0;
  display:flex;flex-direction:column;gap:10px;
  background:linear-gradient(to top,rgba(3,5,11,0.98) 70%,transparent);
}

/* Botão de voz — principal */
.ob-voice-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  background:rgba(255,255,255,0.03);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:24px;padding:22px 20px;
  cursor:pointer;transition:all 0.4s;
  backdrop-filter:blur(12px);
  position:relative;overflow:hidden;
}
.ob-voice-btn::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 100%,rgba(150,100,255,0.08),transparent 70%);
}
.ob-voice-btn:hover{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.06);}
.ob-voice-btn.listening{
  border-color:rgba(255,80,80,0.5);
  background:rgba(255,60,60,0.08);
  animation:listenPulse 1.2s ease-in-out infinite;
}
.ob-voice-btn.speaking{
  border-color:rgba(200,180,255,0.4);
  background:rgba(180,150,255,0.07);
  animation:speakPulse 0.8s ease-in-out infinite;
}
@keyframes listenPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,80,80,0.2);}50%{box-shadow:0 0 0 16px rgba(255,80,80,0);}}
@keyframes speakPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,180,255,0.2);}50%{box-shadow:0 0 0 12px rgba(200,180,255,0);}}

.mic-icon{
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;flex-shrink:0;
}
.ob-voice-btn.listening .mic-icon{background:rgba(255,80,80,0.15);border-color:rgba(255,80,80,0.4);}
.ob-voice-btn.speaking .mic-icon{background:rgba(200,180,255,0.12);border-color:rgba(200,180,255,0.3);}
.mic-icon svg{width:22px;height:22px;}
.voice-status{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.18);text-align:center;transition:all 0.3s;}
.ob-voice-btn.listening .voice-status{color:rgba(255,120,120,0.7);}
.ob-voice-btn.speaking .voice-status{color:rgba(200,180,255,0.6);}
.voice-transcript-live{
  font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;
  color:rgba(255,255,255,0.5);text-align:center;min-height:24px;
  transition:all 0.3s;line-height:1.4;
}

/* Input de texto opcional */
.ob-text-row{
  display:flex;gap:10px;align-items:center;
  opacity:0.5;transition:opacity 0.3s;
}
.ob-text-row:focus-within{opacity:1;}
.ob-text-input{
  flex:1;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);border-radius:14px;
  padding:10px 16px;font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:300;color:rgba(255,255,255,0.7);
  outline:none;caret-color:rgba(200,180,255,0.8);
}
.ob-text-input::placeholder{color:rgba(255,255,255,0.15);font-size:13px;}
.ob-text-send{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:rgba(200,180,255,0.1);border:1px solid rgba(200,180,255,0.18);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;
}
.ob-text-send:hover{background:rgba(200,180,255,0.22);}
.ob-text-send svg{width:14px;height:14px;}
.ob-skip-link{text-align:center;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.1);cursor:pointer;transition:color 0.2s;padding:4px;}
.ob-skip-link:hover{color:rgba(255,255,255,0.28);}

/* ══ TELA FINAL ══ */
#screen-done{
  position:fixed;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;z-index:400;
  background:var(--bg);opacity:0;transition:opacity 1s ease;
}
#screen-done.visible{display:flex;}
#screen-done.active{opacity:1;}
#done-canvas{position:absolute;inset:0;width:100%;height:100%;}
.done-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:24px;padding:32px;}
.done-label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(200,180,255,0.3);animation:fadeUp 1s ease both;}
.done-title{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;color:rgba(255,255,255,0.08);text-align:center;line-height:1.2;animation:fadeUp 1s ease 0.3s both;}
.done-msg{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:rgba(255,255,255,0.5);text-align:center;line-height:1.7;max-width:320px;animation:fadeUp 1s ease 0.6s both;}
.done-restart{margin-top:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.35);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;padding:12px 28px;border-radius:30px;cursor:pointer;transition:all 0.3s;animation:fadeUp 1s ease 1s both;}
.done-restart:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.7);}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="screen-splash">
  <canvas id="splash-canvas"></canvas>
  <div class="splash-content">
    <div class="splash-logo">Neuracle</div>
    <div class="splash-title">Neura</div>
    <div class="splash-sub">Seu segundo cérebro</div>
    <button class="splash-btn" onclick="startDemo()">Conhecer a Neura</button>
    <div class="splash-badge">Demo · Onboarding por voz</div>
  </div>
</div>

<!-- ONBOARDING -->
<div id="screen-onboarding">
  <canvas id="ob-canvas"></canvas>
  <div class="ob-header">
    <div class="ob-logo">Neuracle</div>
    <div class="ob-step-label" id="ob-step-label">Iniciando…</div>
    <div class="ob-progress" id="ob-progress"></div>
  </div>
  <div class="ob-dialog" id="ob-dialog"></div>
  <div class="ob-input-area">
    <div class="ob-voice-btn" id="ob-voice-btn" onclick="handleVoiceTap()">
      <div class="mic-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <div class="voice-status" id="voice-status">Toque para responder</div>
      <div class="voice-transcript-live" id="voice-live"></div>
    </div>
    <div class="ob-text-row">
      <input class="ob-text-input" id="ob-text-input" placeholder="ou digite aqui…" autocomplete="off"/>
      <div class="ob-text-send" onclick="submitText()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </div>
    </div>
    <div class="ob-skip-link" onclick="skipToEnd()">pular demonstração</div>
  </div>
</div>

<!-- TELA FINAL -->
<div id="screen-done">
  <canvas id="done-canvas"></canvas>
  <div class="done-content">
    <div class="done-label">✦ Neura ativada</div>
    <div class="done-title">Agora ela<br>te conhece.</div>
    <div class="done-msg" id="done-msg">Seu segundo cérebro está pronto para cuidar de cada detalhe do seu dia.</div>
    <button class="done-restart" onclick="restartDemo()">Reiniciar demonstração</button>
  </div>
</div>

<script>
// ══ SÍNTESE DE VOZ (Neura fala) ══
const VOICE_LANG = 'pt-BR';
let synthVoice = null;
function loadVoice() {
  const voices = speechSynthesis.getVoices();
  synthVoice = voices.find(v => v.lang.startsWith('pt') && v.name.toLowerCase().includes('fem'))
    || voices.find(v => v.lang.startsWith('pt'))
    || voices.find(v => v.lang === 'pt-BR')
    || voices[0];
}
speechSynthesis.onvoiceschanged = loadVoice;
loadVoice();

function neuraSpeak(text, onEnd) {
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = VOICE_LANG;
  utt.rate = 0.92;
  utt.pitch = 1.05;
  if(synthVoice) utt.voice = synthVoice;
  utt.onend = () => { setSpeaking(false); if(onEnd) onEnd(); };
  utt.onerror = () => { setSpeaking(false); if(onEnd) onEnd(); };
  setSpeaking(true);
  speechSynthesis.speak(utt);
}

// ══ ESTADO ══
let obStep = 0, isListening = false, isSpeaking = false;
let recognition = null, liveText = '';
let profile = {};

// ══ PASSOS DO ONBOARDING ══
const STEPS = [
  {
    id:'welcome',
    text:'Olá. Eu sou a Neura.\n\nSerei seu segundo cérebro — vou aprender tudo sobre sua rotina para cuidar de cada detalhe do seu dia.\n\nPara começar: como posso te chamar?',
    label:'Apresentação',
    field:null,
    process: v => { profile.name = v; return null; },
    next: ()=>1
  },
  {
    id:'city',
    text: ()=>`Que prazer, ${profile.name}. Em qual cidade você mora?`,
    label:'Localização',
    field:'city',
    process: v => { profile.city=v; return null; },
    next:()=>2
  },
  {
    id:'job',
    text:()=>`${profile.city}. Perfeito, vou monitorar tudo por lá. Qual é a sua profissão ou atividade principal?`,
    label:'Profissão',
    field:'job',
    process:v=>{profile.job=v;return null;},
    next:()=>3
  },
  {
    id:'wake',
    text:()=>`${profile.job}. Vou priorizar tudo que for relevante para você. Que horas você costuma acordar?`,
    label:'Rotina',
    field:'wakeTime',
    process:v=>{profile.wakeTime=v;return null;},
    next:()=>4
  },
  {
    id:'married',
    text:()=>`Às ${profile.wakeTime} seu briefing vai estar pronto antes mesmo de você pegar o celular. Você é casado ou tem companheira?`,
    label:'Família',
    field:'married',
    process:v=>{
      profile.married=v;
      const s=v.toLowerCase();
      profile._hasSpouse = s.includes('sim')||s.includes('cas')||s.includes('companh')||s.includes('tenho');
      return null;
    },
    next:()=> profile._hasSpouse ? 5 : 6
  },
  {
    id:'spouse',
    text:()=>`Que bom! Qual o nome dela?`,
    label:'Família',
    field:'spouseName',
    process:v=>{profile.spouseName=v;return null;},
    next:()=>6
  },
  {
    id:'children_q',
    text:()=>{
      const intro = profile.spouseName ? `${profile.spouseName}, vou lembrar de datas especiais. ` : '';
      return `${intro}Você tem filhos?`;
    },
    label:'Filhos',
    field:'children_q',
    process:v=>{
      const s=v.toLowerCase();
      profile._hasChildren = s.includes('sim')||s.includes('tenho');
      return null;
    },
    next:()=> profile._hasChildren ? 7 : 10
  },
  {
    id:'children_count',
    text:()=>`Quantos filhos você tem?`,
    label:'Filhos',
    field:'children_count',
    process:v=>{
      profile._childrenCount=parseInt(v)||1;
      profile.children=[];
      profile._childIdx=0;
      return null;
    },
    next:()=>8
  },
  {
    id:'child_info',
    text:()=>{
      const idx=profile._childIdx||0;
      if(idx===0) return `Qual o nome e a idade do primeiro filho?`;
      return `E o próximo? Nome e idade?`;
    },
    label:'Filhos',
    field:'child_info',
    process:v=>{
      const parts=v.split(/,|\se\s|com/i);
      const name=parts[0].trim();
      const ageStr=parts.slice(1).join(' ').replace(/\D/g,'').trim();
      const age=ageStr||'';
      profile.children.push({name,age});
      profile._childIdx=(profile._childIdx||0)+1;
      return null;
    },
    next:()=> (profile._childIdx < profile._childrenCount) ? 8 : 9
  },
  {
    id:'school',
    text:()=>{
      const names=profile.children.map(c=>c.name).join(' e ');
      return `${names} — anotado, vou cuidar deles também. Que horas eles entram na escola e que horas saem?`;
    },
    label:'Escola',
    field:'school',
    process:v=>{
      profile.schoolInfo=v;
      const nums=v.match(/\d+h?\d*/g)||[];
      if(nums.length>=2){profile.schoolDropTime=nums[0];profile.schoolPickupTime=nums[1];}
      else if(nums.length===1){profile.schoolDropTime=nums[0];}
      return null;
    },
    next:()=>10
  },
  {
    id:'email',
    text:()=>`Vou te alertar antes dos horários da escola com o trânsito em tempo real. Qual o seu e-mail? Vou usar para enviar resumos de reuniões e alertas.`,
    label:'Contato',
    field:'email',
    process:v=>{profile.email=v;return null;},
    next:()=>11
  },
  {
    id:'interests',
    text:()=>`Anotado. Que tipo de notícias e assuntos você quer acompanhar?`,
    label:'Interesses',
    field:'interests',
    process:v=>{profile.interests=v.split(/,|e /i).map(s=>s.trim()).filter(Boolean);return null;},
    next:()=>12
  },
  {
    id:'youtube',
    text:()=>`Ótimo. Você acompanha algum canal do YouTube regularmente?`,
    label:'Canais',
    field:'youtube',
    process:v=>{profile.youtube=v;return null;},
    next:()=>13
  },
  {
    id:'youtube_time',
    text:()=>`Que horas você costuma assistir?`,
    label:'Canais',
    field:'youtubeTime',
    process:v=>{profile.youtubeTime=v;return null;},
    next:()=>14
  },
  {
    id:'meeting',
    text:()=>`Vou notificar quando tiver novidades nesse horário. Você tem reuniões regulares no trabalho?`,
    label:'Reuniões',
    field:'meeting_q',
    process:v=>{
      const s=v.toLowerCase();
      profile._hasMeeting=s.includes('sim')||s.includes('tenho')||s.includes('toda');
      if(!profile._hasMeeting) profile.meetingInfo=v;
      return null;
    },
    next:()=> profile._hasMeeting ? 15 : 16
  },
  {
    id:'meeting_time',
    text:()=>`Que dia e horário costumam ser?`,
    label:'Reuniões',
    field:'meetingTime',
    process:v=>{profile.meetingTime=v;return null;},
    next:()=>16
  },
  {
    id:'meeting_who',
    text:()=>`E quem costuma participar das suas reuniões?`,
    label:'Reuniões',
    field:'meetingParticipants',
    process:v=>{profile.meetingParticipants=v;return null;},
    next:()=>17
  },
  {
    id:'done',
    text:()=>{
      const name=profile.name||'você';
      const child=profile.children&&profile.children.length>0
        ?`Vou cuidar de ${profile.children.map(c=>c.name).join(' e ')} também. `:'';
      return `Tudo pronto, ${name}.\n\n${child}Às ${profile.wakeTime||'manhã'} seu briefing vai estar aqui esperando, antes mesmo de você pegar o celular.\n\nVou monitorar seus compromissos, alertar antes de reuniões e buscar as crianças, transcrever suas reuniões e enviar resumos.\n\nSou sua Neura. Pode contar comigo.`;
    },
    label:'Concluído',
    field:null,
    process:()=>null,
    next:()=>-1
  }
];

// ══ CANVAS NEURAL ══
let canvasT=0, splashNodes=[], obNodes=[], doneNodes=[];
let splashRAF=null, obRAF=null, doneRAF=null;
let obDataCount=0; // cresce conforme dados chegam

function heartbeat(t){
  const period=(60/55)*60, phase=(t%period)/period;
  return 1+Math.exp(-Math.pow((phase-0.1)/0.04,2))*0.22+Math.exp(-Math.pow((phase-0.2)/0.03,2))*0.13;
}

function buildNeuralNodes(canvas, count, radiusScale){
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2;
  const maxR=Math.min(W,H)*radiusScale;
  const layers=[
    {n:1,r:0,sz:3},{n:8,r:maxR*0.15,sz:2.2},
    {n:16,r:maxR*0.32,sz:1.8},{n:24,r:maxR*0.5,sz:1.4},
    {n:Math.floor(count*0.3+30),r:maxR*0.68,sz:1.1},
    {n:Math.floor(count*0.4+36),r:maxR*0.84,sz:0.85},
    {n:Math.floor(count*0.5+44),r:maxR*0.98,sz:0.65},
  ];
  const nodes=[];
  layers.forEach(l=>{
    for(let i=0;i<l.n;i++){
      const a=(i/l.n)*Math.PI*2+Math.random()*0.5;
      nodes.push({
        a,r:l.r*(0.88+Math.random()*0.24),
        speed:(Math.random()-0.5)*0.004,
        sz:l.sz+Math.random()*0.5,
        bright:0.35+Math.random()*0.65,
        pulseOff:Math.random()*Math.PI*2
      });
    }
  });
  return nodes;
}

function drawNeural(canvas, ctx, nodes, t, alpha=1){
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2;
  const hb=heartbeat(t);
  const maxR=Math.min(W,H)*0.42;
  ctx.clearRect(0,0,W,H);
  // Atmosfera
  const atm=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR*1.2);
  atm.addColorStop(0,`rgba(180,200,255,${0.03*hb*alpha})`);
  atm.addColorStop(0.6,`rgba(160,180,255,${0.015*hb*alpha})`);
  atm.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,cy,maxR*1.2,0,Math.PI*2);ctx.fillStyle=atm;ctx.fill();
  // Anéis orbitais
  [0.15,0.32,0.5,0.68,0.84,0.98].forEach((rf,i)=>{
    const wave=Math.sin(t*0.009+i*1.3)*0.5+0.5;
    ctx.beginPath();ctx.arc(cx,cy,maxR*rf*hb,0,Math.PI*2);
    ctx.strokeStyle=`rgba(190,210,255,${0.035*wave*alpha})`;ctx.lineWidth=0.6;ctx.stroke();
  });
  // Core
  const coreR=22*hb;
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR*3);
  cg.addColorStop(0,`rgba(255,255,255,${Math.min(1,1.2*(hb-0.8)*5)*alpha})`);
  cg.addColorStop(0.4,`rgba(220,235,255,${0.5*hb*alpha})`);
  cg.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,cy,coreR*3,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,5*hb,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.min(1,hb)*alpha})`;ctx.fill();
  // Nódulos
  const positions=nodes.map(n=>{
    const a=n.a+n.speed*t;
    return {x:cx+Math.cos(a)*n.r*hb, y:cy+Math.sin(a)*n.r*hb*0.9, sz:n.sz, bright:n.bright, pulseOff:n.pulseOff};
  });
  // Conexões
  const maxDist=maxR*0.5;
  for(let i=0;i<positions.length;i++){
    for(let j=i+1;j<positions.length;j++){
      const dx=positions[i].x-positions[j].x, dy=positions[i].y-positions[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<maxDist){
        ctx.beginPath();ctx.moveTo(positions[i].x,positions[i].y);ctx.lineTo(positions[j].x,positions[j].y);
        ctx.strokeStyle=`rgba(200,220,255,${(1-d/maxDist)*0.09*positions[i].bright*hb*alpha})`;ctx.lineWidth=0.35;ctx.stroke();
      }
    }
    const dx2=positions[i].x-cx, dy2=positions[i].y-cy;
    const d2=Math.sqrt(dx2*dx2+dy2*dy2);
    if(d2<maxR*0.85){
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(positions[i].x,positions[i].y);
      ctx.strokeStyle=`rgba(220,235,255,${(1-d2/(maxR*0.85))*0.05*positions[i].bright*hb*alpha})`;ctx.lineWidth=0.25;ctx.stroke();
    }
  }
  positions.forEach(p=>{
    const pSz=p.sz*(0.9+0.1*Math.sin(t*0.035+p.pulseOff))*hb;
    ctx.beginPath();ctx.arc(p.x,p.y,pSz*3.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,220,255,${0.08*p.bright*alpha})`;ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,pSz,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${p.bright*0.85*alpha})`;ctx.fill();
  });
}

// Splash canvas
function initSplash(){
  const c=document.getElementById('splash-canvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  splashNodes=buildNeuralNodes(c,0,0.38);
  let st=0;
  function loop(){
    drawNeural(c,c.getContext('2d'),splashNodes,st,0.55);
    st++;splashRAF=requestAnimationFrame(loop);
  }
  loop();
}

// Onboarding canvas — cresce com dados
let obT2=0;
function initObCanvas(){
  const c=document.getElementById('ob-canvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  rebuildObNodes();
  function loop(){
    drawNeural(c,c.getContext('2d'),obNodes,obT2,0.65);
    obT2++;obRAF=requestAnimationFrame(loop);
  }
  loop();
}
function rebuildObNodes(){
  const c=document.getElementById('ob-canvas');
  obNodes=buildNeuralNodes(c, obDataCount*3, 0.34+obDataCount*0.012);
}

// ══ PROGRESSO VISUAL ══
function updateProgress(){
  const prog=document.getElementById('ob-progress');
  const total=STEPS.length;
  prog.innerHTML=STEPS.map((_,i)=>{
    const cls=i<obStep?'done':i===obStep?'current':'pending';
    return `<div class="ob-prog-dot ${cls}"></div>`;
  }).join('');
  const step=STEPS[obStep]||STEPS[STEPS.length-1];
  document.getElementById('ob-step-label').textContent=step.label;
}

// ══ FLUXO PRINCIPAL ══
function startDemo(){
  if(splashRAF){cancelAnimationFrame(splashRAF);splashRAF=null;}
  const splash=document.getElementById('screen-splash');
  splash.style.transition='opacity 0.8s ease';
  splash.style.opacity='0';
  setTimeout(()=>{
    splash.style.display='none';
    const ob=document.getElementById('screen-onboarding');
    ob.classList.add('visible');
    initObCanvas();
    setTimeout(()=>{
      ob.classList.add('active');
      obStep=0;profile={};obDataCount=0;
      updateProgress();
      setTimeout(()=>presentStep(STEPS[0]),600);
    },50);
  },800);
}

function presentStep(step){
  if(!step){finishOnboarding();return;}
  const text=typeof step.text==='function'?step.text():step.text;
  addNeuraBubble(text);
  neuraSpeak(text.replace(/\n/g,' '), ()=>{
    if(step.field===null&&step.id!=='done'){
      // Passo sem input — avançar automaticamente após fala
      setTimeout(()=>advanceStep(step,''),300);
    } else if(step.id==='done'){
      setTimeout(finishOnboarding,1500);
    } else {
      setListeningReady();
    }
  });
}

function addNeuraBubble(text){
  const dialog=document.getElementById('ob-dialog');
  // Remove input anterior
  const oldInput=document.getElementById('active-input');
  if(oldInput)oldInput.remove();
  const dots=document.createElement('div');
  dots.className='ob-bubble neura';
  dots.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  dialog.appendChild(dots);
  dialog.scrollTop=dialog.scrollHeight;
  // Substitui dots pelo texto após pequeno delay
  const delay=Math.min(text.length*15,1200);
  setTimeout(()=>{
    dots.style.transition='opacity 0.25s';dots.style.opacity='0';
    setTimeout(()=>{
      dots.remove();
      const b=document.createElement('div');
      b.className='ob-bubble neura';b.style.whiteSpace='pre-line';
      b.textContent=text;
      dialog.appendChild(b);
      dialog.scrollTop=dialog.scrollHeight;
    },250);
  },delay);
}

function addUserBubble(text){
  const dialog=document.getElementById('ob-dialog');
  const b=document.createElement('div');
  b.className='ob-bubble user';b.textContent=text;
  dialog.appendChild(b);
  dialog.scrollTop=dialog.scrollHeight;
}

function setListeningReady(){
  const btn=document.getElementById('ob-voice-btn');
  btn.className='ob-voice-btn';
  document.getElementById('voice-status').textContent='Toque para responder';
  document.getElementById('voice-live').textContent='';
  setSpeaking(false);
}

function setSpeaking(s){
  isSpeaking=s;
  const btn=document.getElementById('ob-voice-btn');
  if(s){
    btn.classList.add('speaking');
    document.getElementById('voice-status').textContent='Neura está falando…';
  } else {
    btn.classList.remove('speaking');
  }
}

// ══ RECONHECIMENTO DE VOZ ══
function handleVoiceTap(){
  if(isSpeaking){ speechSynthesis.cancel(); setSpeaking(false); setListeningReady(); return; }
  if(isListening){ stopListening(); return; }
  startListening();
}

function startListening(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    // Fallback: foca no input de texto
    document.getElementById('ob-text-input').focus();
    return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='pt-BR';recognition.continuous=false;recognition.interimResults=true;
  liveText='';
  recognition.onstart=()=>{
    isListening=true;
    const btn=document.getElementById('ob-voice-btn');
    btn.className='ob-voice-btn listening';
    document.getElementById('voice-status').textContent='Ouvindo…';
  };
  recognition.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(final)liveText+=final;
    document.getElementById('voice-live').textContent=liveText||interim;
  };
  recognition.onend=()=>{
    isListening=false;
    const txt=(liveText||'').trim();
    document.getElementById('voice-live').textContent='';
    setListeningReady();
    if(txt) submitAnswer(txt);
  };
  recognition.onerror=(e)=>{
    isListening=false;
    setListeningReady();
    if(e.error!=='no-speech') document.getElementById('voice-live').textContent='Não entendi. Tente novamente.';
  };
  recognition.start();
}

function stopListening(){
  if(recognition){recognition.stop();}
}

function submitText(){
  const inp=document.getElementById('ob-text-input');
  const val=inp.value.trim();if(!val)return;
  inp.value='';
  submitAnswer(val);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement===document.getElementById('ob-text-input')) submitText();
});

function submitAnswer(text){
  addUserBubble(text);
  const step=STEPS[obStep];
  if(step&&step.process) step.process(text);
  obDataCount++;
  rebuildObNodes(); // cresce o cérebro
  advanceStep(step, text);
}

function advanceStep(step, val){
  let nextIdx=step.next?step.next(val):obStep+1;
  if(nextIdx===-1||nextIdx>=STEPS.length){finishOnboarding();return;}
  obStep=nextIdx;
  updateProgress();
  setTimeout(()=>presentStep(STEPS[obStep]),500);
}

function skipToEnd(){
  speechSynthesis.cancel();
  if(recognition)recognition.stop();
  profile.name=profile.name||'visitante';
  finishOnboarding();
}

function finishOnboarding(){
  speechSynthesis.cancel();
  if(recognition)recognition.stop();
  if(obRAF){cancelAnimationFrame(obRAF);obRAF=null;}
  const ob=document.getElementById('screen-onboarding');
  ob.style.transition='opacity 0.8s ease';ob.style.opacity='0';
  setTimeout(()=>{
    ob.classList.remove('visible','active');ob.style.opacity='';ob.style.transition='';
    showDone();
  },800);
}

function showDone(){
  const sc=document.getElementById('screen-done');
  const c=document.getElementById('done-canvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const nodes=buildNeuralNodes(c,obDataCount*5,0.45);
  let dt=0;
  function loop(){ drawNeural(c,c.getContext('2d'),nodes,dt); dt++;doneRAF=requestAnimationFrame(loop); }
  loop();
  const name=profile.name||'você';
  document.getElementById('done-msg').textContent=`${name}, seu segundo cérebro está pronto. Ele vai cuidar de cada detalhe do seu dia.`;
  sc.classList.add('visible');
  setTimeout(()=>sc.classList.add('active'),50);
  // Neura fala a conclusão
  const finalText=`Tudo pronto, ${name}. Sou sua Neura. Pode contar comigo.`;
  setTimeout(()=>neuraSpeak(finalText),600);
}

function restartDemo(){
  speechSynthesis.cancel();
  if(doneRAF){cancelAnimationFrame(doneRAF);doneRAF=null;}
  const sc=document.getElementById('screen-done');
  sc.style.transition='opacity 0.6s';sc.style.opacity='0';
  setTimeout(()=>{
    sc.classList.remove('visible','active');sc.style.opacity='';sc.style.transition='';
    // Reinicia splash
    const splash=document.getElementById('screen-splash');
    splash.style.display='flex';splash.style.opacity='0';
    splash.style.transition='opacity 0.6s';
    setTimeout(()=>{splash.style.opacity='1';},50);
    const c=document.getElementById('splash-canvas');
    c.width=window.innerWidth;c.height=window.innerHeight;
    splashNodes=buildNeuralNodes(c,0,0.38);
    let st=0;
    function loop(){drawNeural(c,c.getContext('2d'),splashNodes,st,0.55);st++;splashRAF=requestAnimationFrame(loop);}
    loop();
    // Limpa diálogo
    document.getElementById('ob-dialog').innerHTML='';
    obStep=0;profile={};obDataCount=0;
  },600);
}

window.addEventListener('resize',()=>{
  ['splash-canvas','ob-canvas','done-canvas'].forEach(id=>{
    const c=document.getElementById(id);
    if(c){c.width=window.innerWidth;c.height=window.innerHeight;}
  });
});

// Inicia
initSplash();
</script>
